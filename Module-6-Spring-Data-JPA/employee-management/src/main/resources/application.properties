# Module 6 - Spring Data JPA with Hibernate
# Employee Management System
# Author: Abhiram
# ============================================================

# Application name
spring.application.name=employee-management

# Server port
server.port=8080

# ---- MySQL Database Configuration ----
spring.datasource.url=jdbc:mysql://localhost:3306/employee_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- Hibernate / JPA Configuration ----
# update: creates/updates tables based on entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- Logging ----
logging.level.com.abhiram=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ---- Jackson JSON formatting ----
spring.jackson.serialization.indent-output=true
